<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f5f5f5; }
        .login-form { width: 340px; padding: 30px; background: #fff; border-radius: 10px; box-shadow: 0px 0px 20px 0px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="login-form">
        <h4 class="text-center mb-4">PC Manager Login</h4>
        <form action="/login" method="post">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Sign In</button>
            </div>
            <div th:if="${param.error}" class="alert alert-danger mt-3">
                Invalid username or password.
            </div>
        </form>
        <div class="text-center mt-3">
            <a href="/register.html">Create an Account</a>
        </div>
    </div>
</body>
</html>
