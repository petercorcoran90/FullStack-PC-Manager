<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PC Manager</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap5.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="styles.css">
</head>

<body>

	<div id="loginView" class="d-flex align-items-center justify-content-center vh-100">
			<div class="login-container text-center">
	            <i class="fa-solid fa-microchip mb-3" style="font-size: 3rem; color: #c850c0;"></i>
				<h3 class="fw-bold mb-4 text-white">PC Manager 2026</h3>
				<form id="loginForm" onsubmit="return false;">
					<div class="mb-3 text-start">
						<label class="form-label text-white fw-bold">Username</label>
						<input type="text" id="username" class="form-control" required>
					</div>
					<div class="mb-4 text-start">
						<label class="form-label text-white fw-bold">Password</label>
						<input type="password" id="password" class="form-control" required>
					</div>
					<div class="d-grid gap-2">
	                    <button type="submit" id="loginBtn" class="btn text-white rounded-pill py-2 fw-bold"
							style="background-color: #c850c0;">Login</button>
					</div>
					<div id="loginErrorMsg" class="alert alert-danger mt-3 d-none">
						Invalid username or password.
					</div>
				</form>
			</div>
		</div>

	<div id="dashboardView" class="d-none">
		<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: rgba(0,0,0,0.8);">
			<div class="container-fluid px-4">
				<a class="navbar-brand fw-bold" href="#">
					<i class="fa-solid fa-microchip me-2"></i>PC Manager 2026
				</a>
				<div class="d-flex ms-auto">
					<button class="btn btn-outline-light btn-sm px-4 rounded-pill" id="logoutBtn"
						type="button">Logout</button>
				</div>
			</div>
		</nav>

		<div class="container mt-5">
			<div id="inventorySection">
				<div class="d-flex justify-content-between align-items-center mb-4 px-2">
					<h2 class="fw-bold mb-0 text-white" style="text-shadow: 1px 1px 3px rgba(0,0,0,0.2);">Hardware
						Catalogue</h2>
					<button class="btn text-white rounded-pill px-4 shadow" style="background-color: #36304a;"
						id="addPartBtn">
						<i class="fa-solid fa-plus me-1"></i> Add Part
					</button>
				</div>

				<table id="partsTable" class="table custom-table" style="width:100%">
					<thead>
						<tr>
							<th>Name</th>
							<th>Manufacturer</th>
							<th>Category</th>
							<th>Price (€)</th>
							<th>Quantity</th>
							<th class="text-center">Actions</th>
						</tr>
					</thead>
					<tbody>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<div class="modal fade" id="partModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content border-0 shadow-lg" style="border-radius: 10px;">
				<div class="modal-header text-white" style="background-color: #36304a; border-radius: 10px 10px 0 0;">
					<h5 class="modal-title fw-bold" id="partModalLabel">Add Hardware Part</h5>
					<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body p-4">
					<div id="modalErrorAlert" class="alert alert-danger d-none" role="alert"></div>
					<form id="partForm">
						<input type="hidden" id="partId">
						<div class="mb-3">
							<label class="form-label text-muted">Name</label>
							<input type="text" class="form-control border-0 bg-light" id="partName" required>
						</div>
						<div class="row">
							<div class="col-md-6 mb-3">
								<label class="form-label text-muted">Manufacturer</label>
								<input type="text" class="form-control border-0 bg-light" id="partManufacturer"
									required>
							</div>
							<div class="col-md-6 mb-3">
								<label class="form-label text-muted">Category</label>
								<select class="form-select border-0 bg-light" id="partCategory">
									<option value="CPU">CPU</option>
									<option value="GPU">GPU</option>
									<option value="RAM">RAM</option>
									<option value="Motherboard">Motherboard</option>
									<option value="Storage">Storage</option>
									<option value="PSU">PSU</option>
								</select>
							</div>
						</div>
						<div class="row">
							<div class="col-md-6 mb-3">
								<label class="form-label text-muted">Price (€)</label>
								<input type="number" step="0.01" class="form-control border-0 bg-light" id="partPrice"
									required>
							</div>
							<div class="col-md-6 mb-3">
								<label class="form-label text-muted">Quantity</label>
								<input type="number" class="form-control border-0 bg-light" id="partStock" required>
							</div>
						</div>
					</form>
				</div>
				<div class="modal-footer border-0 pb-4 pe-4">
					<button type="button" class="btn btn-light rounded-pill px-4"
						data-bs-dismiss="modal">Cancel</button>
					<button type="button" class="btn text-white rounded-pill px-4" style="background-color: #36304a;"
						id="savePartBtn">Save Part</button>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-sm">
			<div class="modal-content border-0 shadow-lg text-center p-4" style="border-radius: 10px;">
				<div class="modal-body">
					<i class="fa-solid fa-trash-can mb-3" style="font-size: 3rem; color: #36304a;"></i>
					<h5 class="fw-bold mb-3">Are you sure?</h5>
					<p class="text-muted mb-4">Do you really want to delete this part?</p>
					<div class="d-flex justify-content-center gap-2">
						<button type="button" class="btn btn-light rounded-pill px-4"
							data-bs-dismiss="modal">Cancel</button>
						<button type="button" class="btn btn-danger rounded-pill px-4"
							id="confirmDeleteBtn">Delete</button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
	<script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>

	<script src="app.js"></script>
	<script src="auth.js"></script>
	<script src="inventory.js"></script>
</body>

</html>
