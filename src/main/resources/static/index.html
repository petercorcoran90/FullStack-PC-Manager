<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Manager Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PC Manager 2026</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="navInventory">Inventory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="navBuilds">My Builds</a>
                    </li>
                </ul>
				<div class="d-flex">
				    <button class="btn btn-outline-danger" id="logoutBtn" type="button">Logout</button>
				</div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        
        <div id="inventorySection">
            <h2 class="mb-3">Hardware Catalogue</h2>
            <button class="btn btn-success mb-3" id="addPartBtn">
                <i class="fa-solid fa-plus"></i> Add New Part
            </button>
            
            <table id="partsTable" class="table table-striped table-bordered" style="width:100%">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Manufacturer</th>
                        <th>Category</th>
                        <th>Price (€)</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <div id="buildsSection" style="display:none;">
            <h2 class="mb-3">My PC Builds</h2>
            <div class="card mb-4">
                <div class="card-body">
                    <h5>Create New Build</h5>
                    <div class="input-group">
                        <input type="text" id="newBuildName" class="form-control" placeholder="Enter Build Name (e.g., Gaming Beast)">
                        <button class="btn btn-primary" id="createBuildBtn">Create</button>
                    </div>
                </div>
            </div>
            
            <div id="buildsContainer" class="row">
                </div>
        </div>
    </div>

    <div class="modal fade" id="partModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="partModalLabel">Add Hardware Part</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="partForm">
                        <input type="hidden" id="partId">
                        <div class="mb-3">
                            <label class="form-label">Part Name</label>
                            <input type="text" class="form-control" id="partName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Manufacturer</label>
                            <input type="text" class="form-control" id="partManufacturer" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="partCategory">
                                <option value="CPU">CPU</option>
                                <option value="GPU">GPU</option>
                                <option value="RAM">RAM</option>
                                <option value="Motherboard">Motherboard</option>
                                <option value="Storage">Storage</option>
                                <option value="PSU">PSU</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price (€)</label>
                            <input type="number" step="0.01" class="form-control" id="partPrice" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Stock Level</label>
                            <input type="number" class="form-control" id="partStock" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="savePartBtn">Save Part</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this item? This action cannot be undone.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
